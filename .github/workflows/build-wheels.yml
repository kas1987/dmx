name: Build CUDA Wheels

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: Jimver/cuda-toolkit@v0.2.16
        id: cuda-toolkit
        with:
          cuda: '12.4.0'

      - name: Install build deps
        run: pip install --upgrade pip setuptools wheel

      - name: Build wheel
        env:
          TORCH_CUDA_ARCH_LIST: "7.0;7.5;8.0;8.6;8.9;9.0"
        run: pip wheel . -w raw_dist/ --no-deps --no-build-isolation

      - name: Retag wheel (manylinux)
        run: |
          pip install wheel
          mkdir -p dist/
          for whl in raw_dist/*.whl; do
            python -m wheel tags --platform-tag manylinux2014_x86_64 --remove "$whl"
          done
          mv raw_dist/*.whl dist/

      - name: Verify .so in wheel
        run: |
          python -c "
          import zipfile, glob
          whl = glob.glob('dist/*.whl')[0]
          print(f'Wheel: {whl}')
          with zipfile.ZipFile(whl) as z:
              so = [f for f in z.namelist() if f.endswith('.so')]
              assert so, f'No .so in {whl}'
              print(f'OK: contains {so}')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-py${{ matrix.python-version }}
          path: dist/*.whl

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: Jimver/cuda-toolkit@v0.2.16
        id: cuda-toolkit
        with:
          cuda: '12.4.0'

      - name: Install build deps
        run: pip install --upgrade pip setuptools wheel

      - name: Build wheel
        env:
          TORCH_CUDA_ARCH_LIST: "7.0;7.5;8.0;8.6;8.9;9.0"
          FORCE_CUDA: "1"
        run: pip wheel . -w dist/ --no-deps --no-build-isolation

      - name: Verify .dll in wheel
        run: |
          python -c "
          import zipfile, glob
          whl = glob.glob('dist/*.whl')[0]
          print(f'Wheel: {whl}')
          with zipfile.ZipFile(whl) as z:
              dll = [f for f in z.namelist() if f.endswith(('.dll', '.pyd', '.so'))]
              assert dll, f'No native lib in {whl}'
              print(f'OK: contains {dll}')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-windows-py${{ matrix.python-version }}
          path: dist/*.whl

  build-pure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build pure Python wheel (fallback)
        run: |
          pip install setuptools wheel
          pip wheel . -w dist/ --no-deps
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-pure
          path: dist/*.whl

  publish:
    needs: [build-linux, build-windows, build-pure]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Check token
        env:
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [ -z "$TWINE_PASSWORD" ]; then
            echo "ERROR: PYPI_TOKEN secret not set"
            exit 1
          fi
          echo "Token present (${#TWINE_PASSWORD} chars)"

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install twine
          twine check dist/*.whl
          twine upload --verbose dist/*.whl
