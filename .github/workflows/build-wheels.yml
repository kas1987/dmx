name: Build CUDA Wheels

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: Jimver/cuda-toolkit@v0.2.16
        id: cuda-toolkit
        with:
          cuda: '12.4.0'

      - name: Compile CUDA kernel
        run: |
          nvcc -shared -o dmx/dmx_cuda.so kernel/dmx_standalone.cu \
            -O2 --compiler-options -fPIC \
            -gencode=arch=compute_70,code=sm_70 \
            -gencode=arch=compute_75,code=sm_75 \
            -gencode=arch=compute_80,code=sm_80 \
            -gencode=arch=compute_86,code=sm_86 \
            -gencode=arch=compute_89,code=sm_89 \
            -gencode=arch=compute_90,code=sm_90
          ls -la dmx/dmx_cuda.so

      - name: Build wheel (includes pre-compiled .so)
        run: |
          pip install setuptools wheel
          # Build a normal wheel first
          pip wheel . -w raw_dist/ --no-deps
          # Unpack, add .so, repack with platform tag
          cd raw_dist
          python -m wheel unpack *.whl
          WHEEL_DIR=$(ls -d */ | head -1)
          cp ../dmx/dmx_cuda.so "${WHEEL_DIR}dmx/"
          # Fix the WHEEL tag
          sed -i 's/Tag: py3-none-any/Tag: py3-none-manylinux2014_x86_64/' "${WHEEL_DIR}*.dist-info/WHEEL"
          python -m wheel pack "$WHEEL_DIR" -d ../dist/
          cd ..
          ls -la dist/

      - name: Verify .so in wheel
        run: |
          python -c "
          import zipfile, glob
          whl = glob.glob('dist/*.whl')[0]
          print(f'Wheel: {whl}')
          with zipfile.ZipFile(whl) as z:
              so = [f for f in z.namelist() if f.endswith('.so')]
              print(f'Files: {so}')
              assert any('dmx_cuda' in f for f in so), f'dmx_cuda.so not in wheel'
              print('OK')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-py${{ matrix.python-version }}
          path: dist/*.whl

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: ilammy/msvc-dev-cmd@v1

      - uses: Jimver/cuda-toolkit@v0.2.16
        id: cuda-toolkit
        with:
          cuda: '12.4.0'

      - name: Compile CUDA kernel
        shell: cmd
        run: |
          nvcc -shared -o dmx\dmx_cuda.dll kernel\dmx_standalone.cu -O2 "-gencode=arch=compute_70,code=sm_70" "-gencode=arch=compute_75,code=sm_75" "-gencode=arch=compute_80,code=sm_80" "-gencode=arch=compute_86,code=sm_86" "-gencode=arch=compute_89,code=sm_89" "-gencode=arch=compute_90,code=sm_90"
          dir dmx\dmx_cuda.dll

      - name: Build wheel (includes pre-compiled .dll)
        shell: bash
        run: |
          pip install setuptools wheel
          pip wheel . -w raw_dist/ --no-deps
          cd raw_dist
          python -m wheel unpack *.whl
          WHEEL_DIR=$(ls -d */ | head -1)
          cp ../dmx/dmx_cuda.dll "${WHEEL_DIR}dmx/"
          sed -i 's/Tag: py3-none-any/Tag: py3-none-win_amd64/' "${WHEEL_DIR}"*.dist-info/WHEEL
          python -m wheel pack "$WHEEL_DIR" -d ../dist/
          cd ..
          ls -la dist/

      - name: Verify .dll in wheel
        run: |
          python -c "
          import zipfile, glob
          whl = glob.glob('dist/*.whl')[0]
          print(f'Wheel: {whl}')
          with zipfile.ZipFile(whl) as z:
              dll = [f for f in z.namelist() if f.endswith('.dll')]
              print(f'Files: {dll}')
              assert any('dmx_cuda' in f for f in dll), f'dmx_cuda.dll not in wheel'
              print('OK')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-windows-py${{ matrix.python-version }}
          path: dist/*.whl

  build-pure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build pure Python wheel (fallback)
        run: |
          pip install setuptools wheel
          pip wheel . -w dist/ --no-deps
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-pure
          path: dist/*.whl

  publish:
    needs: [build-linux, build-windows, build-pure]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install twine
          twine upload --verbose dist/*.whl
